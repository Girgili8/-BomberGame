<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <meta name="theme-color" content="#07111f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Bomber Arena">
  <link rel="manifest" href="manifest.webmanifest">
  <title>Bomber Arena V5</title>
  <style>
    :root{--gold:#ffd65f;--cyan:#73e8ff;--green:#74e65e;--blue:#2a78c8;--panel:#0d2035;--panel2:#071321;--line:rgba(139,205,255,.34)}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#03070d;color:#fff;font-family:Inter,Arial,sans-serif;touch-action:none}
    body{padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)}
    button{font:inherit;color:#fff;cursor:pointer}
    #app{position:relative;width:100%;height:100%;background:radial-gradient(circle at 50% -15%,#123a5f 0,#06121f 45%,#02060b 100%)}
    #app:before{content:"";position:absolute;inset:0;pointer-events:none;background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);background-size:32px 32px;opacity:.4}
    #hud{height:64px;display:flex;align-items:center;gap:8px;padding:8px 15px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,rgba(8,28,48,.98),rgba(4,13,24,.96));box-shadow:0 10px 30px rgba(0,0,0,.32);position:relative;z-index:20}
    .brand{display:flex;align-items:center;gap:9px;margin-right:4px;font-weight:1000;color:var(--gold);font-size:19px;white-space:nowrap;text-shadow:0 0 16px rgba(255,208,76,.35)}
    .brand-logo{width:35px;height:35px;border-radius:11px;display:grid;place-items:center;background:radial-gradient(circle at 35% 30%,#fff6b0,#ff9f1c 50%,#b13d17);box-shadow:0 0 18px rgba(255,145,31,.38);font-size:21px}
    .brand small{display:block;font-size:9px;letter-spacing:2px;color:#8fd8ff;margin-top:1px}
    .pill{height:43px;min-width:63px;padding:0 10px;border:1px solid rgba(125,190,245,.28);border-radius:13px;display:flex;align-items:center;justify-content:center;gap:6px;background:linear-gradient(180deg,rgba(31,67,103,.88),rgba(11,30,51,.9));font-weight:900;box-shadow:inset 0 1px rgba(255,255,255,.08),0 7px 18px rgba(0,0,0,.2)}
    .pill.coins{color:#ffe58c}.spacer{flex:1}
    #pause{width:47px;height:47px;border-radius:14px;border:1px solid rgba(134,201,255,.38);background:linear-gradient(#264f78,#122b47);font-size:21px;box-shadow:inset 0 1px rgba(255,255,255,.14)}
    #game-wrap{position:absolute;left:0;right:0;top:64px;bottom:0;display:flex;align-items:center;justify-content:center;overflow:hidden}#game{width:100%;height:100%}canvas{display:block;margin:auto}
    #controls{position:absolute;inset:64px 0 0;z-index:30;pointer-events:none}#controls.hidden{display:none}
    #joystick{pointer-events:auto;position:absolute;left:max(24px,env(safe-area-inset-left));bottom:max(22px,env(safe-area-inset-bottom));width:150px;height:150px;border-radius:50%;background:rgba(3,17,31,.43);border:3px solid rgba(128,188,255,.35);box-shadow:0 8px 24px rgba(0,0,0,.35),inset 0 0 25px rgba(62,135,220,.16);backdrop-filter:blur(4px)}
    #joystick:before,#joystick:after{content:"";position:absolute;background:rgba(170,215,255,.15)}#joystick:before{left:74px;top:18px;width:2px;height:114px}#joystick:after{top:74px;left:18px;height:2px;width:114px}
    #stick{position:absolute;left:45px;top:45px;width:60px;height:60px;border-radius:50%;background:radial-gradient(circle at 35% 30%,rgba(222,240,255,.94),rgba(73,121,185,.68));border:2px solid rgba(210,232,255,.72);box-shadow:0 5px 14px rgba(0,0,0,.45);transition:transform .04s linear}
    .action-btn{pointer-events:auto;position:absolute;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:1000;letter-spacing:.3px;text-shadow:0 2px 3px #000;user-select:none}
    #bomb{right:max(28px,env(safe-area-inset-right));bottom:max(27px,env(safe-area-inset-bottom));width:116px;height:116px;border:4px solid rgba(255,210,70,.82);background:radial-gradient(circle at 40% 32%,rgba(42,91,137,.88),rgba(7,27,49,.86));box-shadow:0 8px 25px rgba(0,0,0,.42),inset 0 0 22px rgba(70,160,255,.22),0 0 20px rgba(255,185,45,.14);font-size:15px}#bomb span{font-size:42px;line-height:42px}
    #dash{right:max(151px,calc(env(safe-area-inset-right) + 151px));bottom:max(45px,calc(env(safe-area-inset-bottom) + 45px));width:76px;height:76px;border:3px solid rgba(105,235,255,.75);background:radial-gradient(circle at 40% 32%,rgba(35,160,194,.75),rgba(7,34,57,.88));box-shadow:0 8px 22px rgba(0,0,0,.4),0 0 18px rgba(73,225,255,.2);font-size:10px}#dash span{font-size:26px;line-height:28px}#dash.cooldown{filter:grayscale(.7);opacity:.68}
    #overlay{position:absolute;inset:0;z-index:100;background:radial-gradient(circle at 50% 20%,rgba(23,74,109,.98),rgba(3,10,18,.97) 62%);display:flex;align-items:center;justify-content:center;padding:24px;overflow:auto}
    #overlay:before,#overlay:after{content:"";position:absolute;border-radius:50%;filter:blur(2px);opacity:.55;animation:float 5s ease-in-out infinite}.overlay-orb.one{display:none}#overlay:before{width:230px;height:230px;left:-70px;top:-70px;background:radial-gradient(circle,#2b9ad0,transparent 68%)}#overlay:after{width:260px;height:260px;right:-100px;bottom:-110px;background:radial-gradient(circle,#8d4be1,transparent 68%);animation-delay:-2s}
    @keyframes float{50%{transform:translateY(16px) scale(1.05)}}
    .card{position:relative;width:min(640px,94vw);padding:28px 30px 26px;text-align:center;border:1px solid rgba(134,202,255,.38);border-radius:28px;background:linear-gradient(180deg,rgba(16,47,76,.96),rgba(5,18,32,.97));box-shadow:0 24px 80px rgba(0,0,0,.68),inset 0 1px rgba(255,255,255,.12);overflow:hidden}
    .card:before{content:"";position:absolute;left:12%;right:12%;top:-40px;height:90px;background:radial-gradient(ellipse,rgba(77,204,255,.28),transparent 70%)}
    .menu-badge{position:relative;display:inline-flex;gap:7px;align-items:center;padding:6px 12px;border-radius:999px;border:1px solid rgba(121,220,255,.35);background:rgba(24,96,132,.28);font-size:10px;font-weight:900;letter-spacing:1.7px;color:#a8ecff}
    .card h1{position:relative;margin:12px 0 7px;color:var(--gold);font-size:clamp(34px,5vw,51px);line-height:1;font-weight:1000;letter-spacing:-1.5px;text-shadow:0 4px 0 #7e3e12,0 0 22px rgba(255,209,84,.35)}
    .card p,#ovText{position:relative;color:#c4d8e9;line-height:1.46;margin:10px auto 18px;max-width:560px;font-size:15px}
    .menu-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin:0 0 17px}.stat{padding:10px 8px;border:1px solid rgba(123,190,243,.22);border-radius:13px;background:rgba(3,16,28,.47)}.stat strong{display:block;color:#fff3a9;font-size:18px}.stat span{font-size:9px;letter-spacing:1px;color:#92bad6;font-weight:900}
    .menu-buttons{display:grid;grid-template-columns:1fr 1fr;gap:11px;align-items:center}.menu-buttons button{min-height:52px;border:0;border-radius:15px;padding:12px 18px;background:linear-gradient(180deg,#7bda48,#3c8b25);font-weight:1000;font-size:16px;box-shadow:inset 0 0 0 2px rgba(255,255,255,.14),0 8px 22px rgba(0,0,0,.28);transition:transform .08s,filter .12s}.menu-buttons button:active{transform:scale(.97)}.menu-buttons button.secondary{background:linear-gradient(#3d79ae,#1a4267)}.menu-buttons button.gold{background:linear-gradient(#f6bd3e,#b66b13)}.menu-buttons button.dark{background:linear-gradient(#30445c,#172536)}.menu-buttons button.danger{background:linear-gradient(#c75353,#752323)}
    #loadingBadge{display:none;font-size:18px;color:#fff}.dots::after{content:"";animation:dots 1.2s steps(4,end) infinite}@keyframes dots{0%{content:""}25%{content:"."}50%{content:".."}75%,100%{content:"..."}}
    #toast{position:absolute;left:50%;top:176px;transform:translateX(-50%) translateY(-8px);z-index:70;background:rgba(0,0,0,.82);border:1px solid rgba(141,210,255,.25);padding:10px 18px;border-radius:16px;opacity:0;transition:.2s;pointer-events:none;font-weight:800;box-shadow:0 8px 25px rgba(0,0,0,.34)}
    #missionPanel{position:absolute;z-index:35;top:76px;left:50%;transform:translateX(-50%);width:min(540px,57vw);pointer-events:none;text-align:center}#missionText{display:inline-block;max-width:100%;padding:8px 16px;border-radius:15px;background:rgba(2,10,18,.78);border:1px solid rgba(121,194,255,.42);box-shadow:0 6px 22px rgba(0,0,0,.34);font-weight:900;font-size:14px;text-shadow:0 2px 3px #000}.fury-track{height:9px;margin:7px auto 0;width:82%;border-radius:10px;background:rgba(0,0,0,.68);overflow:hidden;border:1px solid rgba(255,255,255,.26)}#furyFill{height:100%;width:0;background:linear-gradient(90deg,#ffb62e,#fff06b,#60eaff);box-shadow:0 0 12px #ffe45f;transition:width .25s}#furyLabel{font-size:10px;color:#fff3a4;margin-top:3px;font-weight:900;text-shadow:0 2px 3px #000}
    #comboText{position:absolute;left:50%;top:132px;z-index:36;transform:translate(-50%,-8px) scale(.8);opacity:0;color:#fff07a;font-size:26px;font-weight:1000;text-shadow:0 4px 0 #7b3000,0 0 14px #ff8f27;pointer-events:none;transition:.16s}#comboText.show{opacity:1;transform:translate(-50%,0) scale(1)}
    .settings-grid,.shop-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;text-align:left;margin:15px 0 18px}.setting-row,.shop-item{display:flex;align-items:center;justify-content:space-between;gap:10px;min-height:58px;padding:10px 12px;border:1px solid rgba(126,193,244,.24);border-radius:14px;background:rgba(2,15,27,.5);transition:.18s}.shop-item:hover{border-color:rgba(132,222,255,.48);transform:translateY(-1px)}.shop-item.selected{border-color:#ffe16a;box-shadow:0 0 18px rgba(255,210,70,.18),inset 0 0 20px rgba(255,210,70,.06)}.setting-row b,.shop-item b{display:block;font-size:13px}.setting-row small,.shop-item small{display:block;color:#8fb3cd;font-size:10px;margin-top:3px}.toggle,.difficulty-btn,.buy-btn,.shop-tab{border:1px solid rgba(138,210,255,.3);border-radius:10px;background:#173c5e;padding:8px 11px;font-weight:900;font-size:11px;min-width:74px}.toggle.on{background:#348f42}.difficulty-options{display:flex;gap:6px;justify-content:center;margin:4px 0 14px}.difficulty-btn.active,.shop-tab.active{background:#b77919;border-color:#ffd978}.buy-btn{background:#96661b;color:#fff3ad}.buy-btn:disabled{filter:grayscale(.7);opacity:.66}.shop-icon{font-size:27px;min-width:32px}.shop-copy{flex:1}.shop-level{display:block;color:#70efff;font-weight:900;font-size:11px;margin-top:4px}.shop-tabs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:0 auto 8px}.shop-tab{min-height:38px}.skin-preview{width:48px;height:48px;min-width:48px;border-radius:50%;display:grid;place-items:center;font-size:24px;background:radial-gradient(circle at 34% 30%,#fff,var(--skin) 42%,#101a29 74%);border:3px solid var(--trail);box-shadow:0 0 16px color-mix(in srgb,var(--trail) 55%,transparent)}
    .shield-pill{display:flex}.rotate{display:none}
    @media(max-width:980px){#hud{gap:4px;padding:6px 8px}.pill{min-width:51px;height:42px;padding:0 6px;font-size:12px}.brand{font-size:14px}.brand-logo{width:31px;height:31px}.shield-pill{display:none}.coins-pill{display:flex}#missionPanel{top:70px;width:54vw}#missionText{font-size:11px;padding:6px 10px}.card{padding:21px 24px}.card p,#ovText{font-size:13px;margin-bottom:13px}.menu-buttons button{min-height:45px;font-size:14px}.menu-stats{margin-bottom:12px}.stat{padding:7px}.stat strong{font-size:15px}.settings-grid,.shop-grid{gap:7px;margin:10px 0}.setting-row,.shop-item{min-height:49px;padding:7px 9px}.shop-icon{font-size:22px}}
    @media(max-height:560px){.card{padding:16px 22px}.card h1{font-size:32px;margin:8px 0 4px}.card p,#ovText{font-size:12px;line-height:1.35;margin:6px auto 10px}.menu-badge{padding:4px 9px}.menu-stats{margin-bottom:9px}.stat{padding:5px}.menu-buttons{gap:8px}.menu-buttons button{min-height:41px;padding:8px;font-size:13px}.settings-grid,.shop-grid{margin:7px 0 9px}.setting-row,.shop-item{min-height:43px}.difficulty-options{margin-bottom:8px}}
    @media(orientation:portrait){.rotate{display:flex;position:absolute;inset:0;z-index:200;background:radial-gradient(circle at 50% 25%,#123c60,#06111e 62%);align-items:center;justify-content:center;text-align:center;font-size:22px;padding:30px}.rotate b{color:#ffd35b}.rotate .phone{display:block;font-size:54px;margin-bottom:16px;animation:turn 2s ease-in-out infinite}@keyframes turn{50%{transform:rotate(90deg)}}}
  </style>
</head>
<body>
<div id="app">
  <div id="hud">
    <div class="brand"><div class="brand-logo">💣</div><div>BOMBER<small>ARENA V5</small></div></div>
    <div class="pill">⭐ <span id="level">1-1</span></div>
    <div class="pill">🏆 <span id="score">0</span></div>
    <div class="pill coins-pill coins">🪙 <span id="coins">0</span></div>
    <div class="pill">❤️ <span id="lives">3</span></div>
    <div class="pill">💣 <span id="cap">1</span></div>
    <div class="pill">🔥 <span id="pow">2</span></div>
    <div class="pill shield-pill">🛡️ <span id="shield">0</span></div>
    <div class="spacer"></div><button id="pause" aria-label="Пауза">Ⅱ</button>
  </div>
  <div id="game-wrap"><div id="game"></div></div>
  <div id="missionPanel"><div id="missionText">Найди портал и уничтожь врагов</div><div class="fury-track"><div id="furyFill"></div></div><div id="furyLabel">ЗАРЯД 0%</div></div>
  <div id="comboText"></div>
  <div id="controls" class="hidden">
    <div id="joystick"><div id="stick"></div></div>
    <button id="dash" class="action-btn"><span>⚡</span><b id="dashLabel">РЫВОК</b></button>
    <button id="bomb" class="action-btn"><span>💣</span>БОМБА</button>
  </div>
  <div id="toast"></div>
  <div id="overlay">
    <div class="card">
      <div class="menu-badge" id="ovBadge">НОВАЯ ВЕРСИЯ • OFFLINE</div>
      <h1 id="ovTitle">BOMBER ARENA</h1>
      <div id="ovText">Новая арена загружается.</div>
      <div id="ovStats" class="menu-stats"></div>
      <div id="loadingBadge">Загрузка уровня<span class="dots"></span></div>
      <div id="ovButtons" class="menu-buttons">
        <button id="primaryBtn">ИГРАТЬ</button>
        <button id="secondaryBtn" class="secondary">ПРОДОЛЖИТЬ</button>
        <button id="tertiaryBtn" class="gold">МАГАЗИН</button>
        <button id="quaternaryBtn" class="dark">НАСТРОЙКИ</button>
      </div>
    </div>
  </div>
  <div class="rotate"><div><span class="phone">📱</span>Поверни iPhone горизонтально<br><b>Bomber Arena создана для альбомного режима</b></div></div>
</div>
<script src="phaser.min.js"></script>
<script src="game.js?v=5000"></script>
</body>
</html>
